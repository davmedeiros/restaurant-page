<!DOCTYPE html>

    <title>Restaurant Page</title>
  </head>
  <body>
    <div id="content">
      <header>
        <h1>Grumpy Cook</h1>

          <menu>
            <li class="tab">Home</li>

              >
              on
              <a
                href="https://unsplash.com/photos/PDgZtSrgM6M?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"

      </main>
    </div>
